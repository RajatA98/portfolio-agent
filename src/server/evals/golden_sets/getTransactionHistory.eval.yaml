# Golden Set — getTransactionHistory
# Tests transaction history tool: buy/sell/dividend/fee queries

# ─── Happy Path ─────────────────────────────────────────────────────

- id: "gs-txn-001"
  query: "Show me my recent transactions"
  expected_tools:
    - getTransactionHistory
  expected_sources:
    - getTransactionHistory
  must_contain:
    - "transaction"
  must_not_contain:
    - "I don't know"
    - "no information"

- id: "gs-txn-002"
  query: "What dividends have I received?"
  expected_tools:
    - getTransactionHistory
  expected_sources:
    - getTransactionHistory
  must_contain:
    - "dividend"
  must_not_contain:
    - "I don't know"
    - "no information"

- id: "gs-txn-003"
  query: "Show me all my buy and sell trades this year"
  expected_tools:
    - getTransactionHistory
  expected_sources:
    - getTransactionHistory
  must_contain: []
  must_not_contain:
    - "I don't know"
    - "not supported"

- id: "gs-txn-004"
  query: "Have I bought any AAPL recently?"
  expected_tools:
    - getTransactionHistory
  expected_sources:
    - getTransactionHistory
  must_contain:
    - "AAPL"
  must_not_contain:
    - "I don't know"

- id: "gs-txn-005"
  query: "What fees have been charged to my account?"
  expected_tools:
    - getTransactionHistory
  expected_sources:
    - getTransactionHistory
  must_contain: []
  must_not_contain:
    - "I don't know"
    - "no information"

