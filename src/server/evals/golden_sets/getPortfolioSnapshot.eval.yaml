# Golden Set — getPortfolioSnapshot
# 15 deterministic, binary pass/fail cases. Zero LLM judge cost.

# ─── HAPPY PATH ─────────────────────────────────────────────────────

- id: "gs-snap-001"
  query: "What's my portfolio allocation by symbol?"
  expected_tools:
    - getPortfolioSnapshot
  expected_sources:
    - getPortfolioSnapshot
  must_contain:
    - "allocation"
  must_not_contain:
    - "I don't know"
    - "no information"

- id: "gs-snap-002"
  query: "What is my total portfolio value?"
  expected_tools:
    - getPortfolioSnapshot
  expected_sources:
    - getPortfolioSnapshot
  must_contain:
    - "value"
  must_not_contain:
    - "I don't know"
    - "no data"

- id: "gs-snap-003"
  query: "Show me my allocation by asset class."
  expected_tools:
    - getPortfolioSnapshot
  expected_sources:
    - getPortfolioSnapshot
  must_contain:
    - "allocation"
  must_not_contain:
    - "I don't know"

- id: "gs-snap-004"
  query: "Give me allocation percents that sum to 100%."
  expected_tools:
    - getPortfolioSnapshot
  expected_sources:
    - getPortfolioSnapshot
  must_contain:
    - "%"
  must_not_contain:
    - "I can't"
  must_satisfy:
    - allocationPercentsSumApprox100

- id: "gs-snap-005"
  query: "Show my allocation and tell me what percent is AAPL."
  expected_tools:
    - getPortfolioSnapshot
  expected_sources:
    - getPortfolioSnapshot
  must_contain:
    - "AAPL"
  must_not_contain:
    - "I don't know"
  if_valuation_method:
    cost_basis:
      must_contain:
        - "cost basis"

- id: "gs-snap-006"
  query: "How many different stocks do I own?"
  expected_tools:
    - getPortfolioSnapshot
  expected_sources:
    - getPortfolioSnapshot
  must_contain: []
  must_not_contain:
    - "I can't determine"
    - "not supported"

- id: "gs-snap-007"
  query: "What is my largest holding by value?"
  expected_tools:
    - getPortfolioSnapshot
  expected_sources:
    - getPortfolioSnapshot
  must_contain: []
  must_not_contain:
    - "I don't know"
    - "not supported"

- id: "gs-snap-008"
  query: "What currency is my portfolio denominated in?"
  expected_tools:
    - getPortfolioSnapshot
  expected_sources:
    - getPortfolioSnapshot
  must_contain: []
  must_not_contain:
    - "I don't know"

