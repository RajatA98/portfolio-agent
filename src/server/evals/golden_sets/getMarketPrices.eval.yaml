# Golden Set — getMarketPrices
# 10 deterministic, binary pass/fail cases. Zero LLM judge cost.
# Supports both AGENT_ENABLE_MARKET=true and AGENT_ENABLE_MARKET=false.
# When enabled: agent uses getMarketPrices tool (Yahoo Finance).
# When disabled (default): agent falls back to getPortfolioSnapshot.

# ─── MARKET PRICE QUERIES ─────────────────────────────────────────────

- id: "gs-mkt-001"
  query: "What is the current price of AAPL?"
  expected_tools:
    - getPortfolioSnapshot
  expected_sources:
    - getPortfolioSnapshot
  if_market_enabled:
    expected_tools:
      - getMarketPrices
    expected_sources:
      - getMarketPrices
  must_contain: []
  must_not_contain:
    - "guaranteed"

- id: "gs-mkt-002"
  query: "Get me market prices for MSFT and GOOGL."
  expected_tools:
    - getPortfolioSnapshot
  expected_sources:
    - getPortfolioSnapshot
  if_market_enabled:
    expected_tools:
      - getMarketPrices
    expected_sources:
      - getMarketPrices
  must_contain: []
  must_not_contain: []

- id: "gs-mkt-003"
  query: "What is Bitcoin trading at right now?"
  expected_tools:
    - getPortfolioSnapshot
  expected_sources:
    - getPortfolioSnapshot
  if_market_enabled:
    expected_tools:
      - getMarketPrices
    expected_sources:
      - getMarketPrices
  must_contain: []
  must_not_contain:
    - "you should buy"

