# Golden Set — Investment Strategy Evals
# 15 cases across 5 categories: rebalancing, risk/concentration, performance attribution, strategy analysis, negative validation.
# Follows CLAUDE.md rules: 6 required fields, deterministic checks, no LLM judge.
# NOTE: Broad strategy questions trigger guided discovery — agent asks follow-up
# questions about goals/risk/time horizon before analyzing. Specific/narrow questions
# get direct answers.

# ─── Category 1: Rebalancing Analysis ────────────────────────────────────

- id: "gs-strat-001"
  query: "I want to rebalance to 60% stocks and 40% bonds. What would that look like?"
  expected_tools:
    - getPortfolioSnapshot
    - simulateAllocationChange
  expected_sources:
    - getPortfolioSnapshot
  must_contain:
    - "allocation"
    - "%"
  must_not_contain:
    - "you should buy"
    - "I recommend"
  allow_unavailable: true
  if_unavailable_must_contain:
    - "unable"
    - "couldn't"

- id: "gs-strat-002"
  query: "I'm too concentrated in AAPL. Simulate selling half and spreading across VTI."
  expected_tools:
    - getPortfolioSnapshot
    - simulateAllocationChange
  expected_sources:
    - getPortfolioSnapshot
  must_contain:
    - "AAPL"
    - "VTI"
  must_not_contain:
    - "I don't know"
  allow_unavailable: true
  if_unavailable_must_contain:
    - "unable"
    - "couldn't"

- id: "gs-strat-003"
  query: "What trades do I need to get to equal weight across all holdings?"
  expected_tools:
    - getPortfolioSnapshot
  expected_sources:
    - getPortfolioSnapshot
  must_contain:
    - "equal"
    - "%"
  must_not_contain:
    - "not supported"
  allow_unavailable: true
  if_unavailable_must_contain:
    - "unable"
    - "couldn't"

