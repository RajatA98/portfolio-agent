# Golden Set — getAccountBalances
# Tests account balances tool: cash, buying power, uninvested funds

# ─── Happy Path ─────────────────────────────────────────────────────

- id: "gs-bal-001"
  query: "How much cash do I have in my brokerage account?"
  expected_tools:
    - getAccountBalances
  expected_sources:
    - getAccountBalances
  must_contain:
    - "cash"
  must_not_contain:
    - "I don't know"
    - "no information"

- id: "gs-bal-002"
  query: "What is my buying power?"
  expected_tools:
    - getAccountBalances
  expected_sources:
    - getAccountBalances
  must_contain: []
  must_not_contain:
