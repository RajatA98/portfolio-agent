  expected_tools:
    - getPortfolioSnapshot
    - getPerformance
  expected_sources:
    - getPortfolioSnapshot
    - getPerformance
  must_contain:
    - "allocation"
    - "performance"
  must_not_contain:
    - "I don't know"

- id: "gs-perf-005"
  query: "How much money have I made or lost this year?"
  expected_tools:
    - getPortfolioSnapshot
    - getPerformance
  expected_sources:
    - getPerformance
  must_contain: []
  must_not_contain:
    - "I don't know"

