# Golden Set — getPerformance
# 13 deterministic, binary pass/fail cases. Zero LLM judge cost.

# ─── HAPPY PATH ─────────────────────────────────────────────────────

- id: "gs-perf-001"
  query: "How has my portfolio performed year to date?"
  expected_tools:
    - getPortfolioSnapshot
    - getPerformance
  expected_sources:
    - getPerformance
  must_contain:
    - "performance"
  must_not_contain:
    - "I don't know"

- id: "gs-perf-002"
  query: "Show me my month-to-date returns."
  expected_tools:
    - getPortfolioSnapshot
    - getPerformance
  expected_sources:
    - getPerformance
  must_contain: []
  must_not_contain:
    - "I can't"

- id: "gs-perf-003"
  query: "What is my total return percentage for the last year?"
  expected_tools:
    - getPortfolioSnapshot
    - getPerformance
  expected_sources:
    - getPerformance
  must_contain:
    - "return"
  must_not_contain:
    - "I don't know"

- id: "gs-perf-004"
