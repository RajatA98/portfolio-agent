<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GHOSTFOLIO TERMINAL</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="terminalHeader">
      <span class="brand">GHOSTFOLIO TERMINAL</span>
      <span class="headerRight">
        <span><span class="dot" id="headerDot"></span> <span id="headerStatus">OFFLINE</span></span>
        <span id="headerClock"></span>
      </span>
    </header>

    <main class="container">
      <section id="connectSection" class="connectSection">
        <p class="connectHint">Paste your <strong>JWT</strong> (from the URL after logging in at Ghostfolio, e.g. <code>…/auth/eyJhbG…</code>) or your <strong>access token</strong> (Settings → Account).</p>
        <label>
          GHOSTFOLIO JWT OR ACCESS TOKEN
          <input id="accessTokenInput" type="password" placeholder="PASTE JWT OR ACCESS TOKEN" autocomplete="off" />
        </label>
        <div class="connectRow">
          <button id="connectButton" type="button">CONNECT</button>
          <button id="disconnectButton" type="button">DISCONNECT</button>
        </div>
        <span id="connectStatus" class="connectStatus"></span>
      </section>

      <section id="brokerageSection" class="brokerageSection" style="display:none">
        <div class="brokerageRow">
          <button id="connectBrokerageBtn" type="button">CONNECT BROKERAGE</button>
          <span id="brokerageStatus" class="brokerageStatus"></span>
        </div>
      </section>

      <section id="messages" class="messages"></section>

      <section class="inputRow">
        <span class="promptChar">&gt;</span>
        <input id="messageInput" type="text" placeholder="ENTER COMMAND..." />
        <button id="sendButton" type="button">EXEC</button>
      </section>

      <footer class="statusBar">
        <span class="statusLeft">
          <span class="statusDot" id="statusDot"></span>
          <span id="statusText">DISCONNECTED</span>
        </span>
        <span id="statusClock"></span>
      </footer>
    </main>

    <script src="https://cdn.plaid.com/link/v2/stable/link-initialize.js"></script>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
